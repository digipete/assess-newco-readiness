<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    // SPA redirect for GitHub Pages
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + '/' + l.search + l.hash
    );
  </script>
</head>

</body>
</html>
